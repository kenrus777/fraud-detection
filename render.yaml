services:
  - type: web
    name: fraud-detection-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.core.train
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
    healthCheckPath: /health
